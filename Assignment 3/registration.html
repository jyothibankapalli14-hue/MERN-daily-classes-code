<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method="get">
        <fieldset style ="background-color: aquamarine ;border-radius:30px;padding:30px;
            margin:50px;">
            <legend align="center"><h3>Registration Form</h3></legend>
            <label for="User name">Full name:</label>
            <input type="text" required placeholder="Enter" ><br><br>
            <label for="Email">Email:</label>
            <input type="text" required placeholder="Enter"><br><br>
            <label for="password">password:</label>
            <input type="text" required placeholder="Enter"><br><br>
            <label for="confirm password">Confirm password:</label>
            <input type="text" required placeholder="Enter"><br><br>
            <label for="Gender">Gender:</label>
            <input type="radio" value="male">Male
            <input type="radio" value="Female">Female
            <input type="radio" value="Others">Others<br><br>
            <label for="Hobbies">Hobbies:</label>
            <input type="checkbox" value="Reading books">Reading books
            <input type="checkbox" value="Listening to music">Listening to music
            <input type="checkbox" value="playing games">Playing games<br><br>
            <label for="Date of Birth">Date of Birth</label>
            <input type="date"><br><br>
            <button value="submit">Submit</button>
</body>
</html>
