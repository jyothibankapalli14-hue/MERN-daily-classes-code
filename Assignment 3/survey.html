  <body>
    <form style="border: 3px black solid; padding: 40px;">
      <fields id="label" >
        <h1 align="center"><strong>Survey Form</strong></h1> 
        <laber for="User Name">User Name:</laber><br>
        <input type="text" /><br /><br />
        <label for="Feedback">Feedback:</label><br>
        <textarea
          id="Feedback"
          name=""
          rows="5"
          cols="40"
        ></textarea
        ><br /><br />
        <label for="Rating">Rating:</label><br>
        <input type="radio" value="1" />1
        <input type="radio" value="2" />2
        <input type="radio" value="3" />3
        <input type="radio" value="4" />4
        <input type="radio" value="5" />5<br /><br />
        <label for="Favorite Technology">Favorite Technology:</label><br>
        <select id="tech" name="technology">
          <option value="">--Select Technology--</option>
          <option value="mern">MERN Stack</option>
          <option value="java">Java Full Stack</option>
          <option value="python">Python</option>
          <option value="ai">Artificial Intelligence</option></select
        ><br /><br />
        <label for="Subscribe option">Subscribe Option:</label><br>
        <input type="checkbox" value="Yes" />Yes<br>
        <input type="checkbox" value="No" />No<br><br>
        <button value="submit">Submit</button>
      </fieldset>
    </form>
  </body>
