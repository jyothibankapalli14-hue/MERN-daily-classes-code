<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        li:first-child{
            color: aliceblue;
            background-color:brown;
        }
        button:first-of-type{
            background-color: rgb(0, 162, 255);
        }
        li:last-child{
            background-color: chartreuse;
        }
        button:last-of-type{
            background-color: coral;
        }
        li:nth-child(even){
            background-color: cadetblue;
        }
        li:nth-child(3){
            background-color: rgb(6, 113, 113);
            text-shadow: 2px 2px 2px 2px;
            border-radius: 20px;
            margin: 10px;
            padding: 20px;
            font-size: 50px;
            font-family: sans-serif;
        }
        a:visited{
            color: rgb(202, 177, 225);
        }
        a:active{
            color: mediumvioletred;
        }
        input:focus{

        }
        div{
            height: 150px;
            width: 150px;
            background-color: darkgreen;
        }
        div:hover{
            background-color: rgb(100, 62, 0);
        }
        a:hover{
            font-style: italic;
            -moz-text-decoration-color: blueviolet;
        }
    </style>
</head>
<body>
    <div></div>
    <input type="search" placeholder="search" name="" id">
    <h4>
        <a href="https://bitsvizag.com/">click here to visis</a>
    </h4>
    <ol>
        <li>list items-1</li>
        <li>list items-2</li>
        <li>list items-3</li>
        <li>list items-4</li>
        <li>list items-5</li>
    </ol>
    <div>
        <span>span tag</span>
        <button>button-1</button>
        <button>button-2</button>
        <button>button-3</button>
        <button>button-4</button>
        <button>button-5</button>
        <button>button-6</button>
        <button>button-7</button>
    </div>
</body>
</html>
