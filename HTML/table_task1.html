<!DOCTYPE html>
<html>
<head>
    <title>Weather Station</title>
    <style>
        body {
            font-family: serif;
            text-align: center;
        }
        table {
            margin: auto;
            border-collapse: collapse;
            border: 3px solid black;
        }
        th, td {
            border: 2px solid black;
            padding: 10px 20px;
        }
        th {
            font-size: 20px;
        }
        h1 {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<h1>Weather Station</h1>

<table>
    <tr>
        <th rowspan="2">Station</th>
        <th colspan="2">Temperature</th>
        <th rowspan="2">Humidity</th>
        <th rowspan="2">Weather</th>
    </tr>
    <tr>
        <th>Max</th>
        <th>Min</th>
    </tr>

    <tr>
        <td>India</td>
        <td>27</td>
        <td>20</td>
        <td>50%</td>
        <td>Cloudy</td>
    </tr>

    <tr>
        <td>America</td>
        <td>7</td>
        <td>-2</td>
        <td>80%</td>
        <td>Rainy</td>
    </tr>
</table>

</body>
</html>
