<form action="" method="post"></form>
    <br action="" method="post">
        <fieldset style="background:linear-gradient(YELLOW,PURPLE); border-radius: 20px;padding: 30px; margin: 20px;">
            <legend align="center"><h1>Job application</h1></legend>
            <label for="fname">Frist Name: </label>
            <input type="text" id="fname" maxlength="10" minlength="4"
            required placeholder="Enter"><br><br>
            <label for="Last name">Last Name:</label>
            <input type="text" id="lname"  maxlength="15" minlength="3" placeholder="Enter"><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" required placeholder="Enter"><br><br>
            <label for="DOB">DOB:</label>
            <input type="date"><br><br>
            <label for="Age">Age</label>
            <input type="number"><br><br>
            <label for="Gender">Gender:</label>
            <input type="radio" value="male">Male
            <input type="radio" value="Female">Female
            <input type="radio" value="Others">Others<br><br>
            <label f0r="ph No">Phone No:</label>
            <input type="tel" pattern="[6-9]{1}[0-9]{9}" id="phno" maxlength="10" required placeholder="+91"><br><br>
            <label for="state">State:</label>
            <select name="" id="state">
                <option value="choose">Select state</option>
                <option value="AP">AP</option>
                <option value="KA">KA</option>
                <option value="kl">KL</option>
                <option value="TG">TG</option>
             </select><br><br>
             <label for="address">Address:</label>
             <textarea name ="" rows="3" cols="30" id="address" placeholder="enter full address"></textarea><br><br>
             <label for="Skill">Skill:</label>
             <input type="checkbox" value="React.JS">React.JS
             <input type="checkbox" value="MongoDB">MongoDB
             <input type="checkbox" value="Express.JS">Express.JS
             <input type="checkbox" value="Node.Js">Node.JS<br><br>
             <label for="Language">Language:</label>
             <input type="range" value="Hindi">Hindi
             <input type="range" value="English">English
             <input type="range" value="Telugu">Telugu<br><br>
             <label for="resume">Resume:</label>
             <input type="file"><br><br>
             <button value="submit">submit</button>
             <button value="cancel">Cencel</button>
        </fieldset>


</body>
